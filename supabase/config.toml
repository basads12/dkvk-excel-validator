# Supabase local development config
# See: https://supabase.com/docs/guides/cli/config

project_id = "dkvk-excel-validator"

[api]
enabled = true
port = 54321

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://dkvk-excel-validator.vercel.app"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "https://dkvk-excel-validator.vercel.app/auth/callback",
  "https://*.vercel.app/auth/callback"
]

[auth.email]
enable_signup = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "5MiB"
